<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="African wildlife and tree study guide for field guide training">
<title>Bush Study Guide</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg-card: #1a1a1a;
  --bg-card-hover: #222;
  --bg-elevated: #252525;
  --amber: #e8a838;
  --amber-dim: #c4892a;
  --amber-glow: rgba(232,168,56,0.15);
  --burnt: #c45d2c;
  --earth: #8b6b4a;
  --sage: #6b8f71;
  --sage-dim: #4a6b4f;
  --text: #e8e0d8;
  --text-dim: #9a9088;
  --text-faint: #6a6058;
  --border: #2a2a2a;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:80px;
}
/* NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(15,15,15,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:10px 4px 8px; gap:3px;
  background:none; border:none; color:var(--text-dim);
  font:500 10px/1 'Inter',sans-serif; cursor:pointer;
  transition:color .2s;
}
.nav-btn.active { color:var(--amber); }
.nav-btn svg { width:22px; height:22px; }
.nav-btn.active svg { filter:drop-shadow(0 0 6px var(--amber-glow)); }

/* HEADER */
.header {
  padding:20px 20px 16px;
  position:sticky; top:0; z-index:50;
  background:rgba(15,15,15,0.88);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.header h1 {
  font-size:1.5rem; font-weight:700;
  background:linear-gradient(135deg,var(--amber),var(--burnt));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.header .subtitle { font-size:.75rem; color:var(--text-dim); margin-top:2px; }

/* SEARCH */
.search-wrap {
  margin:0 16px 12px; position:relative;
}
.search-input {
  width:100%; padding:12px 16px 12px 40px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font:400 .9rem 'Inter',sans-serif; outline:none;
  transition:border-color .2s;
}
.search-input:focus { border-color:var(--amber-dim); }
.search-input::placeholder { color:var(--text-faint); }
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--text-faint); width:16px; height:16px;
}

/* FILTER PILLS */
.filters {
  display:flex; gap:8px; padding:0 16px 16px;
  overflow-x:auto; scrollbar-width:none;
}
.filters::-webkit-scrollbar { display:none; }
.pill {
  flex-shrink:0; padding:7px 14px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:20px; color:var(--text-dim);
  font:500 .75rem 'Inter',sans-serif; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.pill.active { background:var(--amber); color:#111; border-color:var(--amber); }

/* CARDS GRID */
.cards {
  display:grid; grid-template-columns:1fr;
  gap:12px; padding:0 16px 20px;
}

/* MAMMAL CARD */
.card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:all .25s;
}
.card:active { transform:scale(0.98); }
.card-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 16px 12px;
}
.card-name {
  font-size:1rem; font-weight:600; color:var(--text);
  line-height:1.3;
}
.card-category {
  font-size:.65rem; font-weight:500;
  padding:3px 8px; border-radius:10px;
  text-transform:uppercase; letter-spacing:.5px;
  flex-shrink:0; margin-left:8px;
}
.cat-predator { background:rgba(196,93,44,0.2); color:#e07040; }
.cat-primate { background:rgba(139,107,74,0.2); color:#c4a06a; }
.cat-herbivore { background:rgba(107,143,113,0.2); color:#8bc490; }
.cat-small { background:rgba(120,100,140,0.2); color:#b0a0d0; }
.cat-other { background:rgba(160,140,100,0.2); color:#d0c0a0; }

.card-body {
  max-height:0; overflow:hidden;
  transition:max-height .4s ease;
}
.card.open .card-body { max-height:800px; }
.card-body-inner { padding:0 16px 16px; }

.stat-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px;
}
.stat {
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  padding:10px 12px;
}
.stat-label {
  font-size:.65rem; font-weight:500;
  color:var(--text-faint); text-transform:uppercase;
  letter-spacing:.5px; margin-bottom:4px;
}
.stat-value {
  font-size:.85rem; font-weight:500; color:var(--text);
  line-height:1.4;
}
.stat.full { grid-column:1/-1; }

.card-chevron {
  transition:transform .3s;
  color:var(--text-faint);
  width:18px; height:18px;
}
.card.open .card-chevron { transform:rotate(180deg); }

/* TRACK SECTION */
.track-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  cursor:pointer;
  transition:all .25s;
}
.track-card:active { transform:scale(0.98); }
.track-top {
  display:flex; align-items:center; gap:14px;
}
.track-svg-wrap {
  width:72px; height:72px; flex-shrink:0;
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  padding:8px;
}
.track-svg-wrap svg {
  width:100%; height:100%;
}
.track-info { flex:1; }
.track-name { font-size:1rem; font-weight:600; margin-bottom:4px; }
.track-hint { font-size:.8rem; color:var(--text-dim); line-height:1.4; }
.track-details {
  max-height:0; overflow:hidden; transition:max-height .4s ease;
}
.track-card.open .track-details { max-height:400px; }
.track-details-inner {
  padding-top:14px; margin-top:14px;
  border-top:1px solid var(--border);
  font-size:.85rem; color:var(--text-dim); line-height:1.6;
}
.track-feature { 
  display:flex; gap:8px; margin-bottom:6px; align-items:flex-start; 
}
.track-feature::before {
  content:'•'; color:var(--amber); flex-shrink:0; margin-top:-1px;
}

/* TREE SECTION */
.tree-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  cursor:pointer;
  transition:all .25s;
  display:flex; justify-content:space-between; align-items:center;
}
.tree-card:active { transform:scale(0.98); }
.tree-common { font-size:.95rem; font-weight:600; }
.tree-sci {
  font-size:.85rem; color:var(--sage);
  font-style:italic; text-align:right;
  max-width:55%; opacity:0;
  transition:opacity .3s;
}
.tree-card.show .tree-sci { opacity:1; }
.tree-card .reveal-hint {
  font-size:.7rem; color:var(--text-faint);
  transition:opacity .3s;
}
.tree-card.show .reveal-hint { opacity:0; position:absolute; }

/* QUIZ */
.quiz-container { padding:0 16px 20px; }
.quiz-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 20px;
  text-align:center;
  min-height:200px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.quiz-question {
  font-size:1.1rem; font-weight:600;
  margin-bottom:6px; line-height:1.4;
}
.quiz-sub {
  font-size:.8rem; color:var(--text-dim); margin-bottom:20px;
}
.quiz-options {
  display:flex; flex-direction:column;
  gap:10px; width:100%;
}
.quiz-opt {
  padding:14px 16px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text); font:500 .9rem 'Inter',sans-serif;
  cursor:pointer; text-align:left;
  transition:all .2s;
}
.quiz-opt:active { transform:scale(0.98); }
.quiz-opt.correct { background:rgba(107,143,113,0.3); border-color:var(--sage); color:#a0e0a8; }
.quiz-opt.wrong { background:rgba(196,93,44,0.2); border-color:var(--burnt); color:#e08060; }

.quiz-controls {
  display:flex; gap:10px; margin-top:16px; width:100%;
}
.quiz-btn {
  flex:1; padding:14px;
  border:none; border-radius:var(--radius-sm);
  font:600 .85rem 'Inter',sans-serif;
  cursor:pointer; transition:all .2s;
}
.quiz-btn:active { transform:scale(0.97); }
.quiz-btn-primary { background:var(--amber); color:#111; }
.quiz-btn-secondary { background:var(--bg-elevated); color:var(--text); border:1px solid var(--border); }

.quiz-score {
  display:flex; gap:16px; justify-content:center;
  margin-bottom:16px;
}
.quiz-score-item {
  text-align:center;
}
.quiz-score-num {
  font-size:1.8rem; font-weight:700;
}
.quiz-score-label {
  font-size:.7rem; color:var(--text-dim); text-transform:uppercase;
  letter-spacing:.5px;
}
.score-correct .quiz-score-num { color:var(--sage); }
.score-wrong .quiz-score-num { color:var(--burnt); }
.score-total .quiz-score-num { color:var(--amber); }

.quiz-type-select {
  display:flex; flex-direction:column; gap:10px; width:100%;
}
.quiz-type-btn {
  padding:16px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text); font:500 .9rem 'Inter',sans-serif;
  cursor:pointer; text-align:left;
  transition:all .2s;
}
.quiz-type-btn:active { transform:scale(0.98); }
.quiz-type-btn .qt-title { font-weight:600; margin-bottom:4px; }
.quiz-type-btn .qt-desc { font-size:.75rem; color:var(--text-dim); }

/* SECTION VISIBILITY */
.section { display:none; }
.section.active { display:block; }

/* SORT BAR */
.sort-bar {
  display:flex; gap:8px; padding:0 16px 12px;
  align-items:center;
}
.sort-label {
  font-size:.7rem; color:var(--text-faint); text-transform:uppercase;
  letter-spacing:.5px; flex-shrink:0;
}
.sort-btn {
  padding:5px 10px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:14px; color:var(--text-dim);
  font:500 .7rem 'Inter',sans-serif; cursor:pointer;
  transition:all .2s; white-space:nowrap;
  display:flex; align-items:center; gap:3px;
}
.sort-btn.active { background:var(--amber); color:#111; border-color:var(--amber); }
.sort-btn .sort-arrow { font-size:.6rem; }

/* COUNTER */
.counter {
  padding:0 16px 12px;
  font-size:.75rem; color:var(--text-faint);
}

/* Animations */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.card, .track-card, .tree-card {
  animation:fadeIn .3s ease forwards;
}

/* Scroll to top button */
.scroll-top {
  position:fixed; bottom:88px; right:16px;
  width:40px; height:40px;
  background:var(--amber); color:#111;
  border:none; border-radius:50%;
  display:none; align-items:center; justify-content:center;
  cursor:pointer; z-index:90;
  box-shadow:var(--shadow);
  transition:opacity .2s;
}
.scroll-top.visible { display:flex; }

/* IMAGE BUTTON */
.img-btn {
  flex-shrink:0;
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:50%; color:var(--amber);
  cursor:pointer; padding:0;
  transition:background .2s, transform .1s;
}
.img-btn:active { transform:scale(0.9); background:var(--amber-glow); }
.img-btn svg { width:16px; height:16px; }

/* GALLERY MODAL */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  display:none; align-items:flex-end; justify-content:center;
  opacity:0; transition:opacity .2s;
}
.modal-overlay.open { display:flex; opacity:1; }
.modal {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) 0 0;
  width:100%; max-width:640px;
  max-height:88dvh; display:flex; flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,0.6);
  transform:translateY(16px); transition:transform .25s ease;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.modal-overlay.open .modal { transform:translateY(0); }
@media(min-width:641px){
  .modal-overlay { align-items:center; }
  .modal { border-radius:var(--radius); max-height:82dvh; }
}
.modal-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:12px; padding:18px 18px 12px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.modal-title { font-size:1.05rem; font-weight:600; line-height:1.3; }
.modal-sci { font-size:.8rem; color:var(--sage); font-style:italic; margin-top:2px; }
.modal-close {
  flex-shrink:0; width:32px; height:32px;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:50%; color:var(--text-dim);
  font-size:1rem; cursor:pointer; line-height:1;
  display:flex; align-items:center; justify-content:center;
}
.modal-close:active { transform:scale(0.92); }
.modal-body {
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:14px; flex:1; min-height:160px;
}
.gallery-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
}
.gallery-item {
  position:relative; display:block;
  border-radius:var(--radius-sm); overflow:hidden;
  background:var(--bg-elevated); aspect-ratio:4/3;
  text-decoration:none;
}
.gallery-item img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.gallery-cap {
  position:absolute; left:0; right:0; bottom:0;
  padding:10px 8px 5px; font-size:.6rem; color:#e8e0d8;
  background:linear-gradient(transparent, rgba(0,0,0,0.75));
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gallery-loading, .gallery-error {
  display:flex; align-items:center; justify-content:center;
  min-height:200px; color:var(--text-dim); font-size:.85rem;
  text-align:center; padding:0 20px;
}
.spinner {
  width:34px; height:34px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--amber);
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.modal-foot {
  flex-shrink:0; padding:9px 18px;
  border-top:1px solid var(--border);
  font-size:.65rem; color:var(--text-faint); text-align:center;
}

/* TREE NOTE */
.tree-note {
  max-height:0; overflow:hidden;
  transition:max-height .4s ease;
  font-size:.8rem; color:var(--text-dim); line-height:1.5;
}
.tree-card.show .tree-note { max-height:200px; margin-top:8px; }
.tree-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }

/* OFFLINE BADGE */
.offline-badge {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 150;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(196, 93, 44, 0.2);
  color: #e07040;
  border: 1px solid rgba(196, 93, 44, 0.4);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s ease;
  pointer-events: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: var(--shadow);
}
body.offline-mode .offline-badge {
  opacity: 1;
  transform: translateY(0);
}
.offline-badge svg {
  width: 14px;
  height: 14px;
}

/* COMPARE MODE */
.compare-toggle {
  padding:6px 14px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:20px; color:var(--text-dim);
  font:500 .75rem 'Inter',sans-serif; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.compare-toggle.active {
  background:var(--amber); color:#111; border-color:var(--amber);
}

.compare-add-btn {
  flex-shrink:0;
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:50%; color:var(--text-dim);
  cursor:pointer; padding:0;
  transition:all .2s;
  font-size:.8rem;
}
.compare-add-btn:active { transform:scale(0.9); }
.compare-add-btn.staged {
  background:var(--amber); color:#111; border-color:var(--amber);
}

.compare-bar {
  position:fixed; bottom:60px; left:12px; right:12px;
  z-index:95;
  background:rgba(26,26,26,0.95);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--amber-dim);
  border-radius:var(--radius);
  padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  gap:12px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.5);
  animation:slideUp .25s ease;
  padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}
.compare-bar-text {
  font-size:.8rem; color:var(--text); line-height:1.4;
}
.compare-bar-text strong { color:var(--amber); }
.compare-bar-cancel {
  flex-shrink:0; padding:6px 14px;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:20px; color:var(--text-dim);
  font:500 .7rem 'Inter',sans-serif; cursor:pointer;
  transition:all .2s;
}
.compare-bar-cancel:active { transform:scale(0.95); }

.compare-container { padding:0 16px 20px; }

.compare-picker {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; margin-bottom:16px;
}
.compare-slot {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px;
  position:relative; min-height:100px;
  display:flex; flex-direction:column; gap:8px;
}
.compare-slot.filled { border-color:var(--amber-dim); }
.compare-slot-label {
  font-size:.65rem; font-weight:500; color:var(--text-faint);
  text-transform:uppercase; letter-spacing:.5px;
}
.compare-slot-name {
  font-size:.95rem; font-weight:600; color:var(--text);
}
.compare-slot-placeholder {
  font-size:.85rem; color:var(--text-faint); font-style:italic;
}

.compare-dropdown-wrap { position:relative; }
.compare-search {
  width:100%; padding:8px 12px;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text);
  font:400 .8rem 'Inter',sans-serif; outline:none;
}
.compare-search:focus { border-color:var(--amber-dim); }
.compare-search::placeholder { color:var(--text-faint); }
.compare-dropdown {
  position:absolute; top:100%; left:0; right:0;
  max-height:180px; overflow-y:auto;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:0 0 var(--radius-sm) var(--radius-sm);
  z-index:60; display:none;
}
.compare-dropdown.open { display:block; }
.compare-dropdown-item {
  padding:8px 12px; font-size:.8rem; cursor:pointer;
  color:var(--text-dim); transition:background .15s;
}
.compare-dropdown-item:hover {
  background:var(--amber-glow); color:var(--text);
}

.compare-clear {
  position:absolute; top:10px; right:10px;
  width:22px; height:22px; border-radius:50%;
  background:var(--bg-elevated); border:1px solid var(--border);
  color:var(--text-faint); font-size:.7rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.compare-clear:active { transform:scale(0.9); }

.compare-results {
  display:flex; flex-direction:column; gap:2px;
}
.compare-row {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; padding:12px;
  background:var(--bg-card); border-radius:var(--radius-sm);
}
.compare-row-label {
  grid-column:1/-1;
  font-size:.65rem; font-weight:500; color:var(--amber-dim);
  text-transform:uppercase; letter-spacing:.5px;
  margin-bottom:4px; padding-bottom:4px;
  border-bottom:1px solid var(--border);
}
.compare-cell {
  font-size:.82rem; color:var(--text); line-height:1.5;
}
.compare-cell-header {
  font-size:.7rem; font-weight:600; color:var(--text-dim);
  margin-bottom:2px;
}
.compare-row.diff { border-left:3px solid var(--amber); }

.compare-images-toggle {
  display:flex; align-items:center; justify-content:center;
  gap:8px; padding:10px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-sm); margin-bottom:12px;
  cursor:pointer; color:var(--text-dim);
  font:500 .8rem 'Inter',sans-serif;
  transition:all .2s; width:100%;
}
.compare-images-toggle:hover { color:var(--text); }
.compare-images-toggle svg { width:16px; height:16px; }

.compare-images-panel {
  display:none;
  grid-template-columns:1fr 1fr; gap:12px;
  margin-bottom:16px;
}
.compare-images-panel.open { display:grid; }
.compare-img-col {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-sm); overflow:hidden;
}
.compare-img-col-header {
  padding:10px 12px; font-size:.75rem; font-weight:600;
  color:var(--text-dim); border-bottom:1px solid var(--border);
  text-align:center;
}
.compare-img-col-body {
  display:flex; flex-direction:column; gap:6px; padding:8px;
  min-height:120px; align-items:center; justify-content:center;
}
.compare-img-col-body img {
  width:100%; border-radius:6px; object-fit:cover;
  aspect-ratio:4/3;
}

.compare-swap {
  display:flex; align-items:center; justify-content:center;
  padding:8px; margin-bottom:12px;
  background:none; border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text-dim);
  font:500 .75rem 'Inter',sans-serif; cursor:pointer;
  gap:6px; transition:all .2s; width:100%;
}
.compare-swap:hover { color:var(--amber); border-color:var(--amber-dim); }
.compare-swap svg { width:14px; height:14px; }

/* QUIZ COUNT PICKER */
.quiz-count-picker {
  display:flex; gap:8px; margin:16px 0;
  justify-content:center;
}
.quiz-count-btn {
  padding:10px 22px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-dim);
  font:600 .85rem 'Inter',sans-serif;
  cursor:pointer; transition:all .2s;
}
.quiz-count-btn:active { transform:scale(0.95); }
.quiz-count-btn:hover { border-color:var(--amber-dim); color:var(--text); }

/* QUIZ MODE GRID */
.quiz-mode-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; width:100%;
}
.quiz-mode-card {
  padding:16px 12px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer; transition:all .2s;
  text-align:center;
}
.quiz-mode-card:active { transform:scale(0.97); }
.quiz-mode-card:hover { border-color:var(--amber-dim); }
.quiz-mode-icon { font-size:1.5rem; margin-bottom:8px; }
.quiz-mode-title {
  font-size:.8rem; font-weight:600;
  color:var(--text); margin-bottom:4px;
}
.quiz-mode-desc {
  font-size:.65rem; color:var(--text-dim); line-height:1.3;
}

/* QUIZ CATEGORY HEADER */
.quiz-cat-header {
  font-size:.7rem; font-weight:600;
  color:var(--text-faint); text-transform:uppercase;
  letter-spacing:1px; padding:16px 0 8px;
}

/* FLASHCARD */
.flashcard-container {
  perspective:1000px;
  width:100%; min-height:220px;
  margin-bottom:16px;
}
.flashcard {
  width:100%; min-height:220px;
  position:relative;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .5s ease;
}
.flashcard.flipped { transform:rotateY(180deg); }
.flashcard-face {
  position:absolute; inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 20px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
}
.flashcard-back { transform:rotateY(180deg); }
.flashcard-mammal {
  font-size:1.3rem; font-weight:700;
  background:linear-gradient(135deg,var(--amber),var(--burnt));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin-bottom:8px;
}
.flashcard-prompt {
  font-size:.85rem; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:.5px;
}
.flashcard-answer {
  font-size:1.05rem; font-weight:600;
  color:var(--text); line-height:1.5;
  max-width:92%;
}
.flashcard-field {
  font-size:.7rem; color:var(--amber-dim);
  text-transform:uppercase; letter-spacing:.5px;
  margin-bottom:8px;
}
.flashcard-hint {
  font-size:.75rem; color:var(--text-faint); margin-top:16px;
}

/* SRS BUTTONS */
.srs-buttons { display:flex; gap:8px; width:100%; }
.srs-btn {
  flex:1; padding:12px 8px;
  border:none; border-radius:var(--radius-sm);
  font:600 .8rem 'Inter',sans-serif;
  cursor:pointer; transition:all .2s;
  text-align:center;
}
.srs-btn:active { transform:scale(0.95); }
.srs-again { background:rgba(196,93,44,0.3); color:#e08060; }
.srs-hard { background:rgba(232,168,56,0.2); color:var(--amber); }
.srs-easy { background:rgba(107,143,113,0.3); color:#a0e0a8; }

/* FILL IN BLANK */
.fib-input-wrap {
  display:flex; gap:10px; width:100%; margin-top:16px;
}
.fib-input {
  flex:1; padding:14px 16px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font:400 .9rem 'Inter',sans-serif;
  outline:none; transition:border-color .2s;
}
.fib-input:focus { border-color:var(--amber-dim); }
.fib-input::placeholder { color:var(--text-faint); }
.fib-submit {
  padding:14px 20px;
  background:var(--amber); color:#111;
  border:none; border-radius:var(--radius-sm);
  font:600 .85rem 'Inter',sans-serif;
  cursor:pointer; transition:all .2s; flex-shrink:0;
}
.fib-submit:active { transform:scale(0.95); }
.fib-result {
  margin-top:12px; padding:12px;
  border-radius:var(--radius-sm);
  font-size:.85rem; line-height:1.5;
  width:100%; text-align:left;
}
.fib-result.correct {
  background:rgba(107,143,113,0.2);
  border:1px solid var(--sage); color:#a0e0a8;
}
.fib-result.wrong {
  background:rgba(196,93,44,0.15);
  border:1px solid var(--burnt); color:#e08060;
}

/* MATCH COLUMNS */
.match-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; width:100%;
}
.match-column {
  display:flex; flex-direction:column; gap:8px;
}
.match-col-label {
  font-size:.65rem; font-weight:600;
  color:var(--text-faint); text-transform:uppercase;
  letter-spacing:.5px; text-align:center; padding-bottom:4px;
}
.match-item {
  padding:12px;
  background:var(--bg-elevated);
  border:2px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text); font-size:.8rem;
  cursor:pointer; transition:all .2s;
  text-align:center; line-height:1.3;
  min-height:44px;
  display:flex; align-items:center; justify-content:center;
}
.match-item:active { transform:scale(0.96); }
.match-item.selected {
  border-color:var(--amber);
  background:var(--amber-glow);
  box-shadow:0 0 12px var(--amber-glow);
}
.match-item.matched-correct {
  border-color:var(--sage);
  background:rgba(107,143,113,0.2);
  color:#a0e0a8;
  pointer-events:none; opacity:0.7;
}
.match-item.matched-wrong {
  border-color:var(--burnt);
  background:rgba(196,93,44,0.15);
  color:#e08060;
  animation:shake .4s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}

/* RANKING */
.rank-list {
  display:flex; flex-direction:column;
  gap:6px; width:100%;
}
.rank-prompt {
  font-size:.85rem; color:var(--text-dim);
  text-align:center; margin-bottom:8px;
}
.rank-item {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text); font-size:.9rem;
  font-weight:500; transition:all .2s;
  user-select:none; -webkit-user-select:none;
}
.rank-item.correct-pos {
  border-color:var(--sage); background:rgba(107,143,113,0.15);
}
.rank-item.wrong-pos {
  border-color:var(--burnt); background:rgba(196,93,44,0.1);
}
.rank-num {
  width:24px; height:24px;
  background:var(--bg-card); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:700;
  color:var(--amber); flex-shrink:0;
}
.rank-arrows {
  display:flex; flex-direction:column;
  gap:2px; margin-left:auto; flex-shrink:0;
}
.rank-arrow {
  width:28px; height:22px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:6px; color:var(--text-dim);
  font-size:.7rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.rank-arrow:active {
  background:var(--amber); color:#111; transform:scale(0.9);
}
.rank-value {
  font-size:.7rem; color:var(--text-faint); margin-left:4px;
}

/* TRUE/FALSE */
.tf-statement {
  font-size:1.05rem; font-weight:500;
  line-height:1.5; margin-bottom:20px;
  text-align:center;
}
.tf-buttons { display:flex; gap:12px; width:100%; }
.tf-btn {
  flex:1; padding:16px;
  border:2px solid var(--border);
  border-radius:var(--radius-sm);
  font:700 1rem 'Inter',sans-serif;
  cursor:pointer; transition:all .2s;
  text-align:center; background:var(--bg-elevated);
}
.tf-btn:active { transform:scale(0.95); }
.tf-true { color:var(--sage); }
.tf-false { color:var(--burnt); }
.tf-btn.sel-correct {
  background:rgba(107,143,113,0.3); border-color:var(--sage);
}
.tf-btn.sel-wrong {
  background:rgba(196,93,44,0.2); border-color:var(--burnt);
}
.tf-explanation {
  margin-top:12px; padding:10px;
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  font-size:.8rem; color:var(--text-dim);
  text-align:left; width:100%; line-height:1.4;
}

/* INLINE STUDY MODE */
.study-btn {
  flex-shrink:0; width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:50%; color:var(--amber);
  cursor:pointer; padding:0;
  transition:background .2s, transform .1s;
  font-size:.8rem;
}
.study-btn:active { transform:scale(0.9); background:var(--amber-glow); }
.study-btn.active {
  background:var(--amber); color:#111; border-color:var(--amber);
}
.stat-hidden .stat-value {
  filter:blur(8px);
  user-select:none; -webkit-user-select:none;
  cursor:pointer; transition:filter .3s;
}
.stat-hidden .stat-value.revealed {
  filter:none; cursor:default;
}
.stat-hidden .stat {
  position:relative;
}
.reveal-label {
  position:absolute;
  font-size:.6rem; color:var(--amber-dim);
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none; opacity:0.9;
  text-transform:uppercase; letter-spacing:.5px;
  font-weight:600;
}
.stat-value.revealed + .reveal-label { display:none; }
.study-progress {
  display:flex; align-items:center; gap:8px;
  padding:10px 12px; margin-top:10px;
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  font-size:.75rem; color:var(--text-dim);
}
.study-progress-fill {
  flex:1; height:4px;
  background:var(--border); border-radius:2px;
  overflow:hidden;
}
.study-progress-bar {
  height:100%; background:var(--sage);
  border-radius:2px; transition:width .3s;
}

/* QUIZ MISTAKES REVIEW */
.mistakes-list {
  display:flex; flex-direction:column;
  gap:8px; width:100%; margin-top:8px;
}
.mistake-item {
  padding:12px;
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  border-left:3px solid var(--burnt);
  text-align:left;
}
.mistake-q {
  font-size:.8rem; color:var(--text-dim); margin-bottom:4px;
}
.mistake-correct {
  font-size:.85rem; color:var(--sage); font-weight:500;
}
.mistake-yours {
  font-size:.75rem; color:var(--burnt); margin-top:2px;
}
</style>
</head>

let activeMammalFilter = 'all';
let activeSort = {key:null, dir:0}; // dir: 0=none, 1=asc, -1=desc
const sortLabels = {name:'Name',_w:'Weight',_g:'Gestation',_l:'Lifespan'};

function toggleSort(key) {
  if(activeSort.key === key) {
    activeSort.dir = activeSort.dir === 1 ? -1 : activeSort.dir === -1 ? 0 : 1;
  } else {
    activeSort.key = key; activeSort.dir = 1;
  }
  if(activeSort.dir === 0) activeSort.key = null;
  updateSortButtons();
  renderMammals();
}

function updateSortButtons() {
  document.querySelectorAll('.sort-btn').forEach(b => {
    const k = b.dataset.sort;
    b.classList.toggle('active', k === activeSort.key && activeSort.dir !== 0);
    const arrow = activeSort.key === k ? (activeSort.dir === 1 ? ' ↑' : activeSort.dir === -1 ? ' ↓' : '') : '';
    b.textContent = sortLabels[k] + arrow;
  });
}

function renderMammals() {
  const search = document.getElementById('mammal-search').value.toLowerCase();
  const container = document.getElementById('mammal-cards');
  const isOnline = navigator.onLine;
  let filtered = mammals.filter(m => {
    const matchCat = activeMammalFilter === 'all' || m.cat === activeMammalFilter;
    const matchSearch = !search || m.name.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  if(activeSort.key && activeSort.dir !== 0) {
    filtered = [...filtered].sort((a,b) => {
      const va = activeSort.key === 'name' ? a.name.toLowerCase() : a[activeSort.key];
      const vb = activeSort.key === 'name' ? b.name.toLowerCase() : b[activeSort.key];
      if(va < vb) return -1 * activeSort.dir;
      if(va > vb) return 1 * activeSort.dir;
      return 0;
    });
  }
  container.innerHTML = filtered.map((m, i) => `
    <div class="card" data-idx="${i}" onclick="this.classList.toggle('open')">
      <div class="card-header">
        <div class="card-name">${m.name}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="study-btn" title="Study mode" aria-label="Study ${m.name}" onclick="event.stopPropagation();toggleStudyMode(event)">🧠</button>
          <button class="compare-add-btn${compareStagedName === m.name ? ' staged' : ''}" title="Add to compare" aria-label="Compare ${m.name}" onclick="event.stopPropagation();stageForCompare('${m.name.replace(/'/g, "\\'")}')">⚖️</button>
          ${inatIds[m.name] ? `<button class="img-btn" title="${isOnline ? 'View photos' : 'Photos offline'}" aria-label="View photos of ${m.name}" ${isOnline ? '' : 'disabled style="opacity:0.3;pointer-events:none"'} onclick="event.stopPropagation();openGallery(${inatIds[m.name]})">${IMG_ICON}</button>` : ''}
          <span class="card-category ${catCss[m.cat]}">${catLabels[m.cat]}</span>
          <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-body"><div class="card-body-inner">
        <div class="stat-grid">
          <div class="stat"><div class="stat-label">Lifespan</div><div class="stat-value">${m.lifespan}</div></div>
          <div class="stat"><div class="stat-label">Adult Weight</div><div class="stat-value">${m.weight}</div></div>
          <div class="stat"><div class="stat-label">Gestation</div><div class="stat-value">${m.gestation}</div></div>
          <div class="stat"><div class="stat-label">Weaning Age</div><div class="stat-value">${m.weaning}</div></div>
          <div class="stat full"><div class="stat-label">Territorial</div><div class="stat-value">${m.territorial}</div></div>
          <div class="stat full"><div class="stat-label">Social Structure</div><div class="stat-value">${m.social}</div></div>
          <div class="stat full"><div class="stat-label">Food</div><div class="stat-value">${m.food}</div></div>
        </div>
      </div></div>
    </div>
  `).join('');
  document.getElementById('mammal-counter').textContent = `${filtered.length} of ${mammals.length} mammals`;
}

function initMammalFilters() {
  const el = document.getElementById('mammal-filters');
  const cats = [{key:'all',label:'All'},...Object.entries(catLabels).map(([k,v])=>({key:k,label:v}))];
  el.innerHTML = cats.map(c => `<button class="pill${c.key==='all'?' active':''}" data-cat="${c.key}">${c.label}</button>`).join('');
  el.addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if(!btn) return;
    el.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    activeMammalFilter = btn.dataset.cat;
    renderMammals();
  });
}

// ============================================

// ============================================
function toggleStudyMode(event) {
  const card = event.target.closest('.card');
  if (!card) return;
  const btn = card.querySelector('.study-btn');
  const isActive = card.classList.contains('study-active');
  if (isActive) {
    card.classList.remove('study-active');
    const grid = card.querySelector('.stat-grid');
    if (grid) grid.classList.remove('stat-hidden');
    card.querySelectorAll('.stat-value').forEach(v => { v.classList.remove('revealed'); v.onclick = null; });
    card.querySelectorAll('.reveal-label').forEach(l => l.remove());
    const prog = card.querySelector('.study-progress');
    if (prog) prog.remove();
    if (btn) btn.classList.remove('active');
  } else {
    card.classList.add('open', 'study-active');
    const grid = card.querySelector('.stat-grid');
    if (grid) grid.classList.add('stat-hidden');
    card.querySelectorAll('.stat-value').forEach(v => {
      v.classList.remove('revealed');
      const lbl = document.createElement('span');
      lbl.className = 'reveal-label';
      lbl.textContent = 'tap to reveal';
      v.parentElement.appendChild(lbl);
      v.onclick = function(e) { e.stopPropagation(); revealStudyStat(this, card); };
    });
    if (btn) btn.classList.add('active');
    const total = card.querySelectorAll('.stat-value').length;
    const progHtml = `<div class="study-progress"><span class="sp-count">0/${total}</span><div class="study-progress-fill"><div class="study-progress-bar" style="width:0%"></div></div></div>`;
    card.querySelector('.card-body-inner').insertAdjacentHTML('beforeend', progHtml);
  }
}
function revealStudyStat(el, card) {
  if (el.classList.contains('revealed')) return;
  el.classList.add('revealed');
  const total = card.querySelectorAll('.stat-value').length;
  const revealed = card.querySelectorAll('.stat-value.revealed').length;
  const cnt = card.querySelector('.sp-count');
  if (cnt) cnt.textContent = `${revealed}/${total}`;
  const bar = card.querySelector('.study-progress-bar');
  if (bar) bar.style.width = `${(revealed/total)*100}%`;
}

// --- SRS (Spaced Repetition) ---
function getSRS() {
  try { return JSON.parse(localStorage.getItem('bush_srs') || '{}'); } catch(e) { return {}; }
}
function saveSRS(data) { localStorage.setItem('bush_srs', JSON.stringify(data)); }
function srsKey(mammal, field) { return mammal + '|' + field; }
function srsRate(mammal, field, rating) {
  const data = getSRS();
  const k = srsKey(mammal, field);
  const cur = data[k] || { box:0, lastReview:0 };
  if (rating === 'again') cur.box = 0;
  else if (rating === 'hard') cur.box = Math.max(0, Math.min(cur.box + 1, 2));
  else if (rating === 'easy') cur.box = Math.min(cur.box + 2, 4);
  cur.lastReview = Date.now();
  data[k] = cur;
  saveSRS(data);
}
function getSRSPrioritized() {
  const data = getSRS();
  const fields = ['lifespan','weight','gestation','weaning','food','social','territorial'];
  const cards = [];
  for (const m of mammals) {
    for (const f of fields) {
      const k = srsKey(m.name, f);
      const srs = data[k] || { box:0, lastReview:0 };
      cards.push({ mammal:m, field:f, box:srs.box, lastReview:srs.lastReview });
    }
  }
  cards.sort((a,b) => a.box - b.box || a.lastReview - b.lastReview);
  return cards;
}

// --- UTILITIES ---
function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function pickRandom(arr, n, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return shuffle(pool).slice(0, n);
}
function sliceToCount(arr, count) {
  return count === 'all' ? arr : arr.slice(0, Math.min(parseInt(count), arr.length));
}

// --- QUESTION GENERATORS ---
function generateMammalFactQuestions(count) {
  const qs = [];
  const fields = [
    {key:'lifespan',label:'lifespan'},{key:'weight',label:'adult weight'},
    {key:'gestation',label:'gestation period'},{key:'weaning',label:'weaning age'},
    {key:'food',label:'diet'},{key:'social',label:'social structure'},
    {key:'territorial',label:'territorial behavior'},
  ];
  const pool = shuffle(mammals);
  for(const m of pool) {
    const f = fields[Math.floor(Math.random()*fields.length)];
    const correct = m[f.key];
    const wrongs = pickRandom(mammals, 6, m).map(w => w[f.key]).filter(w => w !== correct);
    const unique = [...new Set(wrongs)].slice(0,3);
    if(unique.length < 3) continue;
    const opts = shuffle([correct, ...unique]);
    qs.push({ q:`What is the ${f.label} of <strong>${m.name}</strong>?`, opts, correct, mammal:m.name, field:f.key });
  }
  return sliceToCount(qs, count);
}

function generateTerritorialQuestions(count) {
  const qs = [];
  for(const m of shuffle(mammals)) {
    const isYes = m.territorial.toLowerCase().startsWith('yes');
    qs.push({ q:`Is the <strong>${m.name}</strong> territorial?`, opts:['Yes','No'], correct:isYes?'Yes':'No', detail:m.territorial, mammal:m.name, field:'territorial' });
  }
  return sliceToCount(qs, count);
}

function generateTrackQuestions() {
  const qs = [];
  for(const t of shuffle(tracks)) {
    const hint = t.features[Math.floor(Math.random()*t.features.length)];
    const wrongs = pickRandom(tracks, 3, t).map(w => w.name);
    qs.push({ q:`Which animal has this track feature?<br><em>"${hint}"</em>`, sub:`Size: ${t.size}`, opts:shuffle([t.name,...wrongs]), correct:t.name });
  }
  return qs;
}

function generateTreeSciQuestions() {
  const qs = [];
  for(const t of shuffle(trees)) {
    const wrongs = pickRandom(trees, 3, t).map(w => w.sci);
    qs.push({ q:`What is the scientific name of <strong>${t.common}</strong>?`, opts:shuffle([t.sci,...wrongs]), correct:t.sci });
  }
  return qs;
}

function generateTreeCommonQuestions() {
  const qs = [];
  for(const t of shuffle(trees)) {
    const wrongs = pickRandom(trees, 3, t).map(w => w.common);
    qs.push({ q:`What is the common name of <em>${t.sci}</em>?`, opts:shuffle([t.common,...wrongs]), correct:t.common });
  }
  return qs;
}

function generateFillBlankQuestions(count) {
  const qs = [];
  const fields = [
    {key:'_g',display:'gestation',label:'gestation period (in days)',unit:'days'},
    {key:'_w',display:'weight',label:'adult weight (in kg)',unit:'kg'},
    {key:'_l',display:'lifespan',label:'lifespan (in years)',unit:'yrs'},
  ];
  for(const m of shuffle(mammals)) {
    const f = fields[Math.floor(Math.random()*fields.length)];
    qs.push({ mammal:m.name, field:f.display, prompt:`What is the ${f.label} of <strong>${m.name}</strong>?`,
      answer:m[f.key], unit:f.unit, fullAnswer:f.key==='_g'?m.gestation:f.key==='_w'?m.weight:m.lifespan });
  }
  return sliceToCount(qs, count);
}

function generateTrueFalseQuestions(count) {
  const qs = [];
  const fields = [
    {key:'_g',label:'gestation period is',fmt:m=>m.gestation},
    {key:'_l',label:'lifespan is',fmt:m=>m.lifespan},
    {key:'_w',label:'weight is approximately',fmt:m=>m.weight},
    {key:'weaning',label:'weaning age is',fmt:m=>m.weaning},
  ];
  for(const m of shuffle(mammals)) {
    const f = fields[Math.floor(Math.random()*fields.length)];
    const makeTrue = Math.random() > 0.5;
    let displayValue, correct;
    if(makeTrue) {
      displayValue = f.fmt(m); correct = true;
    } else {
      const others = mammals.filter(x => x!==m && f.fmt(x)!==f.fmt(m));
      if(others.length===0) { displayValue = f.fmt(m); correct = true; }
      else { const o = others[Math.floor(Math.random()*others.length)]; displayValue = f.fmt(o); correct = false; }
    }
    qs.push({ statement:`The <strong>${m.name}</strong>'s ${f.label} <strong>${displayValue}</strong>`,
      correct, explanation:`${m.name}: ${f.fmt(m)}`, mammal:m.name, field:f.key });
  }
  return sliceToCount(qs, count);
}

// --- START QUIZ ---
function startQuiz(type, count) {
  quiz.type = type; quiz.idx = 0; quiz.score = 0; quiz.wrong = 0;
  quiz.answered = false; quiz.mistakes = []; quiz.count = count;
  switch(type) {
    case 'mammal-facts': quiz.questions = generateMammalFactQuestions(count); break;
    case 'territorial': quiz.questions = generateTerritorialQuestions(count); break;
    case 'track-id': quiz.questions = generateTrackQuestions(); break;
    case 'tree-sci': quiz.questions = generateTreeSciQuestions(); break;
    case 'tree-common': quiz.questions = generateTreeCommonQuestions(); break;
    case 'fill-blank': quiz.questions = generateFillBlankQuestions(count); startFillBlank(); return;
    case 'true-false': quiz.questions = generateTrueFalseQuestions(count); startTrueFalse(); return;
  }
  renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  if(quiz.idx >= quiz.questions.length) { renderQuizResults(); return; }
  const q = quiz.questions[quiz.idx];
  quiz.answered = false;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:.8rem;color:var(--text-dim)">${quiz.idx+1} / ${quiz.questions.length}</span>
      <span style="font-size:.8rem;color:var(--sage)">✓ ${quiz.score}</span>

      ${q.sub ? `<div class="quiz-sub">${q.sub}</div>` : '<div style="height:12px"></div>'}
      <div class="quiz-options">
        ${q.opts.map((o,i) => `<button class="quiz-opt" data-opt="${i}" onclick="answerQuiz(${i})">${o}</button>`).join('')}
      </div>
      ${q.detail ? `<div id="quiz-detail" style="display:none;margin-top:12px;font-size:.8rem;color:var(--text-dim);text-align:left;width:100%;padding:10px;background:var(--bg-elevated);border-radius:var(--radius-sm)">${q.detail}</div>` : ''}

    </div>
  `;
}
function answerQuiz(optIdx) {
  if(quiz.answered) return;
  quiz.answered = true;
  const q = quiz.questions[quiz.idx];
  const btns = document.querySelectorAll('.quiz-opt');
  const selected = btns[optIdx];
  const isCorrect = q.opts[optIdx] === q.correct;
  if(isCorrect) { quiz.score++; selected.classList.add('correct'); }
  else { quiz.wrong++; selected.classList.add('wrong');
    quiz.mistakes.push({q:q.q, correct:q.correct, yours:q.opts[optIdx], mammal:q.mammal, field:q.field});
  }
  btns.forEach((b,i) => { if(q.opts[i]===q.correct) b.classList.add('correct'); });
  const detail = document.getElementById('quiz-detail');
  if(detail) detail.style.display = 'block';
  const next = document.getElementById('quiz-next');
  next.style.opacity='1'; next.style.pointerEvents='auto';
}
function nextQuiz() { quiz.idx++; renderQuiz(); }

function startFlashcards() {

      <div style="font-size:.7rem;color:var(--text-faint);text-align:center;margin-bottom:8px">How well did you know this?</div>

        <button class="srs-btn srs-again" onclick="rateFlashcard('again')">😵 Again</button>

function flipFlashcard() {

  flashcardState.flipped = true;
  document.getElementById('flashcard').classList.add('flipped');

function rateFlashcard(rating) {
  const c = flashcardState.cards[flashcardState.idx];
  srsRate(c.mammal.name, c.field, rating);
  flashcardState.reviewed++; flashcardState.idx++;
  renderFlashcard();
}

let fibState = { questions:[], idx:0, score:0, wrong:0, mistakes:[], answered:false };
function startFillBlank() {

function checkFillBlank() {
  if(fibState.answered) return;
  fibState.answered = true;
  const q = fibState.questions[fibState.idx];
  const input = document.getElementById('fib-answer');
  const userVal = parseFloat(input.value);
  const correct = q.answer;
  const tolerance = q.unit==='kg' ? 0.15 : 0.08;
  const isCorrect = !isNaN(userVal) && Math.abs(userVal-correct) <= Math.max(correct*tolerance, 1);
  const ra = document.getElementById('fib-result-area');
  if(isCorrect) {
    fibState.score++;
    ra.innerHTML = `<div class="fib-result correct">✓ Correct! ${q.fullAnswer}</div>`;
  } else {
    fibState.wrong++;
    ra.innerHTML = `<div class="fib-result wrong">✗ The answer is <strong>${correct} ${q.unit}</strong><br>${q.fullAnswer}</div>`;
    fibState.mistakes.push({q:q.prompt,correct:`${correct} ${q.unit} — ${q.fullAnswer}`,yours:input.value||'(no answer)',mammal:q.mammal,field:q.field});
  }
  input.disabled = true;
  document.getElementById('fib-submit').style.display='none';
  const next = document.getElementById('fib-next');
  next.style.opacity='1'; next.style.pointerEvents='auto';
}
function nextFillBlank() { fibState.idx++; renderFillBlank(); }

// MATCH PAIRS MODE
// ============================================
let matchState = { leftItems:[], rightItems:[], selLeft:null, selRight:null, matched:0, total:0, round:0, rounds:0, totalScore:0, totalWrong:0, fieldObj:null, allMammals:[] };

function startMatchPairs() {
  const fields = [{key:'gestation',label:'Gestation Period'},{key:'lifespan',label:'Lifespan'},{key:'weight',label:'Adult Weight'},{key:'weaning',label:'Weaning Age'}];
  matchState.fieldObj = fields[Math.floor(Math.random()*fields.length)];
  matchState.round=0; matchState.totalScore=0; matchState.totalWrong=0;
  matchState.allMammals = shuffle(mammals);
  matchState.rounds = Math.ceil(matchState.allMammals.length / 5);
  nextMatchRound();
}
function nextMatchRound() {
  const start = matchState.round * 5;
  const group = matchState.allMammals.slice(start, start+5);
  if(group.length===0) {
    quiz.score=matchState.totalScore; quiz.wrong=matchState.totalWrong;
    quiz.mistakes=[]; quiz.type='match'; quiz.count='all';
    renderQuizResults(); return;
  }
  matchState.leftItems = group.map(m=>({name:m.name,value:m[matchState.fieldObj.key],matched:false}));
  matchState.rightItems = shuffle(group.map(m=>({name:m.name,value:m[matchState.fieldObj.key],matched:false})));
  matchState.selLeft=null; matchState.selRight=null;
  matchState.matched=0; matchState.total=group.length; matchState.round++;
  renderMatchPairs();
}
function renderMatchPairs() {
  const area = document.getElementById('quiz-area');
  const {leftItems,rightItems,fieldObj,round,rounds,totalScore,selLeft,selRight} = matchState;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:.8rem;color:var(--text-dim)">Round ${round} / ${rounds}</span>
      <span style="font-size:.8rem;color:var(--sage)">✓ ${totalScore}</span>
    </div>
    <div class="quiz-card" style="padding:16px">
      <div class="quiz-question" style="font-size:.95rem;margin-bottom:4px">Match ${fieldObj.label}</div>
      <div class="quiz-sub">Tap a mammal, then its ${fieldObj.label.toLowerCase()}</div>
      <div class="match-grid">
        <div class="match-column">
          <div class="match-col-label">Mammal</div>
          ${leftItems.map((p,i) => `<div class="match-item match-left${p.matched?' matched-correct':''}${selLeft===i?' selected':''}" onclick="selectMatchLeft(${i})">${p.name}</div>`).join('')}
        </div>
        <div class="match-column">
          <div class="match-col-label">${fieldObj.label}</div>
          ${rightItems.map((p,i) => `<div class="match-item match-right${p.matched?' matched-correct':''}${selRight===i?' selected':''}" onclick="selectMatchRight(${i})">${p.value}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="quiz-controls" style="margin-top:12px">
      <button class="quiz-btn quiz-btn-secondary" onclick="showQuizMenu()">Quit</button>
    </div>
  `;
}
function selectMatchLeft(idx) {
  if(matchState.leftItems[idx].matched) return;
  matchState.selLeft = idx;
  document.querySelectorAll('.match-left').forEach((e,i) => e.classList.toggle('selected', i===idx && !matchState.leftItems[i].matched));
  if(matchState.selRight !== null) setTimeout(checkMatch, 80);
}
function selectMatchRight(idx) {
  if(matchState.rightItems[idx].matched) return;
  matchState.selRight = idx;
  document.querySelectorAll('.match-right').forEach((e,i) => e.classList.toggle('selected', i===idx && !matchState.rightItems[i].matched));
  if(matchState.selLeft !== null) setTimeout(checkMatch, 80);
}
function checkMatch() {
  const left = matchState.leftItems[matchState.selLeft];
  const right = matchState.rightItems[matchState.selRight];
  if(!left||!right) return;
  const leftEls = document.querySelectorAll('.match-left');
  const rightEls = document.querySelectorAll('.match-right');
  if(left.value === right.value) {
    matchState.totalScore++; matchState.matched++;
    left.matched = true; right.matched = true;
    leftEls[matchState.selLeft].classList.remove('selected');
    leftEls[matchState.selLeft].classList.add('matched-correct');
    rightEls[matchState.selRight].classList.remove('selected');
    rightEls[matchState.selRight].classList.add('matched-correct');
    matchState.selLeft=null; matchState.selRight=null;
    if(matchState.matched >= matchState.total) setTimeout(nextMatchRound, 700);
  } else {
    matchState.totalWrong++;
    leftEls[matchState.selLeft].classList.add('matched-wrong');
    rightEls[matchState.selRight].classList.add('matched-wrong');
    const sl = matchState.selLeft, sr = matchState.selRight;
    matchState.selLeft=null; matchState.selRight=null;
    setTimeout(()=>{
      leftEls[sl].classList.remove('selected','matched-wrong');
      rightEls[sr].classList.remove('selected','matched-wrong');
    }, 500);
  }
}

// RANKING MODE
// ============================================
let rankState = { items:[], fieldObj:null, submitted:false, round:0, rounds:0, totalScore:0, totalWrong:0, allMammals:[] };

function startRanking() {
  const fields = [{key:'_w',label:'Weight',unit:'kg',sort:'lightest → heaviest'},
    {key:'_g',label:'Gestation',unit:'days',sort:'shortest → longest'},
    {key:'_l',label:'Lifespan',unit:'yrs',sort:'shortest → longest'}];
  rankState.fieldObj = fields[Math.floor(Math.random()*fields.length)];
  rankState.round=0; rankState.totalScore=0; rankState.totalWrong=0;
  rankState.allMammals = shuffle(mammals); rankState.rounds = Math.ceil(mammals.length/5);
  nextRankRound();
}
function nextRankRound() {
  const start = rankState.round * 5;
  const group = rankState.allMammals.slice(start, start+5);
  if(group.length < 2) {
    quiz.score=rankState.totalScore; quiz.wrong=rankState.totalWrong;
    quiz.mistakes=[]; quiz.type='rank'; quiz.count='all';
    renderQuizResults(); return;
  }
  rankState.items = shuffle(group.map(m=>({name:m.name, value:m[rankState.fieldObj.key]})));
  rankState.submitted = false; rankState.round++;
  renderRanking();
}
function renderRanking() {
  const area = document.getElementById('quiz-area');
  const {items,fieldObj,submitted,round,rounds,totalScore} = rankState;
  const sorted = [...items].sort((a,b)=>a.value-b.value);
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:.8rem;color:var(--text-dim)">Round ${round} / ${rounds}</span>
      <span style="font-size:.8rem;color:var(--sage)">✓ ${totalScore}</span>
    </div>
    <div class="quiz-card" style="padding:16px">
      <div class="quiz-question" style="font-size:.95rem">Sort by ${fieldObj.label}</div>
      <div class="rank-prompt">${fieldObj.sort}</div>
      <div class="rank-list">
        ${items.map((item,i) => {
          const posClass = submitted ? (item.name===sorted[i].name ? 'correct-pos' : 'wrong-pos') : '';
          return `<div class="rank-item ${posClass}">
            <div class="rank-num">${i+1}</div>
            <span>${item.name}</span>
            ${submitted ? `<span class="rank-value">${item.value} ${fieldObj.unit}</span>` : ''}
            ${!submitted ? `<div class="rank-arrows">
              <button class="rank-arrow" onclick="moveRankItem(${i},-1)" ${i===0?'disabled style="opacity:0.3"':''}>▲</button>
              <button class="rank-arrow" onclick="moveRankItem(${i},1)" ${i===items.length-1?'disabled style="opacity:0.3"':''}>▼</button>
            </div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="quiz-controls" style="margin-top:12px">
      <button class="quiz-btn quiz-btn-secondary" onclick="showQuizMenu()">Quit</button>
      ${!submitted ?
        `<button class="quiz-btn quiz-btn-primary" onclick="submitRanking()">Check Order</button>` :
        `<button class="quiz-btn quiz-btn-primary" onclick="nextRankRound()">Next →</button>`}
    </div>
  `;
}
function moveRankItem(idx, dir) {
  if(rankState.submitted) return;
  const ni = idx + dir;
  if(ni<0 || ni>=rankState.items.length) return;
  [rankState.items[idx], rankState.items[ni]] = [rankState.items[ni], rankState.items[idx]];
  renderRanking();
}
function submitRanking() {
  rankState.submitted = true;
  const sorted = [...rankState.items].sort((a,b)=>a.value-b.value);
  let correct = 0;
  for(let i=0;i<rankState.items.length;i++) {
    if(rankState.items[i].name===sorted[i].name) correct++;
  }
  rankState.totalScore += correct;
  rankState.totalWrong += (rankState.items.length - correct);
  renderRanking();
}

let tfState = { questions:[], idx:0, score:0, wrong:0, mistakes:[], answered:false };

function startTrueFalse() {
  tfState.questions = quiz.questions; tfState.idx=0; tfState.score=0;
  tfState.wrong=0; tfState.mistakes=[]; tfState.answered=false;
  renderTrueFalse();
}
function renderTrueFalse() {
  const area = document.getElementById('quiz-area');
  const {questions,idx,score} = tfState;
  if(idx >= questions.length) {
    quiz.score=tfState.score; quiz.wrong=tfState.wrong; quiz.mistakes=tfState.mistakes;
    renderQuizResults(); return;
  }
  const q = questions[idx]; tfState.answered = false;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:.8rem;color:var(--text-dim)">${idx+1} / ${questions.length}</span>
      <span style="font-size:.8rem;color:var(--sage)">✓ ${score}</span>
    </div>
    <div class="quiz-card">
      <div class="tf-statement">${q.statement}</div>
      <div class="tf-buttons">
        <button class="tf-btn tf-true" id="tf-true" onclick="answerTF(true)">✓ True</button>
        <button class="tf-btn tf-false" id="tf-false" onclick="answerTF(false)">✗ False</button>
      </div>
      <div id="tf-explain" style="display:none"></div>
    </div>
    <div class="quiz-controls" style="margin-top:12px">
      <button class="quiz-btn quiz-btn-secondary" onclick="showQuizMenu()">Quit</button>
      <button class="quiz-btn quiz-btn-primary" id="tf-next" style="opacity:0.4;pointer-events:none" onclick="nextTF()">Next →</button>
    </div>
  `;
}
function answerTF(userAnswer) {
  if(tfState.answered) return;
  tfState.answered = true;
  const q = tfState.questions[tfState.idx];
  const isCorrect = userAnswer === q.correct;
  const trueBtn = document.getElementById('tf-true');
  const falseBtn = document.getElementById('tf-false');
  if(isCorrect) {
    tfState.score++;
    (userAnswer ? trueBtn : falseBtn).classList.add('sel-correct');
  } else {
    tfState.wrong++;
    (userAnswer ? trueBtn : falseBtn).classList.add('sel-wrong');
    (q.correct ? trueBtn : falseBtn).classList.add('sel-correct');
    tfState.mistakes.push({q:q.statement,correct:q.correct?'True':'False',yours:userAnswer?'True':'False',mammal:q.mammal});
  }
  document.getElementById('tf-explain').innerHTML = `<div class="tf-explanation">${q.explanation}</div>`;
  document.getElementById('tf-explain').style.display = 'block';
  const next = document.getElementById('tf-next');
  next.style.opacity='1'; next.style.pointerEvents='auto';
}
function nextTF() { tfState.idx++; renderTrueFalse(); }

const galleryCache = new Map();   // taxonId -> photos[] (session cache)
let galleryAbort = null;          // in-flight fetch controller
let currentGalleryId = null;      // guards against out-of-order responses

function openGallery(id) {
  const meta = galleryMeta[id] || {title:'', sci:''};
  currentGalleryId = id;
  document.getElementById('gallery-title').textContent = meta.title;
  document.getElementById('gallery-sci').textContent = meta.sci;
  document.getElementById('gallery-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  const body = document.getElementById('gallery-body');
  if (galleryCache.has(id)) { renderGallery(id, galleryCache.get(id)); return; }

  body.innerHTML = '<div class="gallery-loading"><div class="spinner"></div></div>';
  if (galleryAbort) galleryAbort.abort();
  galleryAbort = new AbortController();

  fetch(`https://api.inaturalist.org/v1/taxa/${id}?locale=en`, {signal: galleryAbort.signal})
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      const t = data.results && data.results[0];
      const photos = ((t && t.taxon_photos) || [])
        .filter(p => p && p.photo && p.photo.url)
        .slice(0, 8)
        .map(p => ({
          thumb: p.photo.url.replace('/square.', '/medium.'),
          full:  p.photo.url.replace('/square.', '/large.'),
          by:    p.photo.attribution_name || 'iNaturalist',
          lic:   (p.photo.license_code || '').toUpperCase().replace('CC-', 'CC ')
        }));
      galleryCache.set(id, photos);
      renderGallery(id, photos);
    })
    .catch(err => {
      if (err.name === 'AbortError') return;
      if (currentGalleryId !== id) return;
      body.innerHTML = '<div class="gallery-error">Couldn’t load images.<br>Check your connection and try again.</div>';
    });
}

function renderGallery(id, photos) {
  if (currentGalleryId !== id) return;   // a newer gallery was opened
  const body = document.getElementById('gallery-body');
  if (!photos.length) {
    body.innerHTML = '<div class="gallery-error">No photos available for this species.</div>';
    return;
  }
  body.innerHTML = '<div class="gallery-grid">' + photos.map(p => `
    <a class="gallery-item" href="${p.full}" target="_blank" rel="noopener noreferrer">
      <img src="${p.thumb}" loading="lazy" decoding="async" alt=""
           onerror="this.closest('.gallery-item').style.display='none'">
      <span class="gallery-cap">© ${p.by}${p.lic ? ' · ' + p.lic : ''}</span>
    </a>`).join('') + '</div>';
}

function closeGallery() {
  currentGalleryId = null;
  if (galleryAbort) { galleryAbort.abort(); galleryAbort = null; }
  document.getElementById('gallery-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// close on overlay click (but not when clicking the modal itself) and on Esc
document.getElementById('gallery-modal').addEventListener('click', e => {
  if (e.target.id === 'gallery-modal') closeGallery();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('gallery-modal').classList.contains('open')) closeGallery();
});

// ============================================
// COMPARE MODE
// ============================================
let compareMode = false;
let compareStagedName = null;
let compareSelection = { a: null, b: null };
let compareImagesLoaded = false;

function stageForCompare(name) {
  const mammal = mammals.find(m => m.name === name);
  if (!mammal) return;

  if (compareStagedName === name) {
    cancelCompareStaging();
    return;
  }

  if (!compareStagedName) {
    compareStagedName = name;
    renderMammals();
    showCompareBar(name);
  } else {
    const first = mammals.find(m => m.name === compareStagedName);
    compareStagedName = null;
    hideCompareBar();

    compareSelection.a = first;
    compareSelection.b = mammal;

    compareMode = true;
    document.getElementById('compare-toggle').classList.add('active');
    showCompareView();
    updateCompareSlotDisplay('a');
    updateCompareSlotDisplay('b');
    renderComparison();
    document.getElementById('compare-swap').style.display = 'flex';
  }
}

function showCompareBar(name) {
  const bar = document.getElementById('compare-bar');
  document.getElementById('compare-bar-text').innerHTML =
    `<strong>${name}</strong> selected · tap another ⚖️ to compare`;
  bar.style.display = 'flex';
}

function hideCompareBar() {
  document.getElementById('compare-bar').style.display = 'none';
}

function cancelCompareStaging() {
  compareStagedName = null;
  hideCompareBar();
  renderMammals();
}

function toggleCompareMode() {
  compareMode = !compareMode;
  document.getElementById('compare-toggle').classList.toggle('active', compareMode);

  if (compareMode) {
    if (compareStagedName) {
      compareSelection.a = mammals.find(m => m.name === compareStagedName);
      compareStagedName = null;
      hideCompareBar();
    }
    showCompareView();
    if (compareSelection.a) updateCompareSlotDisplay('a');
    if (compareSelection.b) updateCompareSlotDisplay('b');
    if (compareSelection.a && compareSelection.b) {
      renderComparison();
      document.getElementById('compare-swap').style.display = 'flex';
    }
  } else {
    exitCompareMode();
  }
}

function showCompareView() {
  document.getElementById('compare-container').style.display = 'block';
  const section = document.getElementById('sec-mammals');
  ['.search-wrap','#mammal-filters','.sort-bar','.counter','#mammal-cards'].forEach(sel => {
    const el = section.querySelector(sel);
    if (el) el.style.display = 'none';
  });
}

function exitCompareMode() {
  compareMode = false;
  compareStagedName = null;
  compareSelection = { a: null, b: null };
  hideCompareBar();
  document.getElementById('compare-toggle').classList.remove('active');
  document.getElementById('compare-container').style.display = 'none';
  document.getElementById('compare-results').innerHTML = '';
  document.getElementById('compare-images-section').innerHTML = '';
  document.getElementById('compare-swap').style.display = 'none';

  const section = document.getElementById('sec-mammals');
  ['.search-wrap','#mammal-filters','.sort-bar','.counter','#mammal-cards'].forEach(sel => {
    const el = section.querySelector(sel);
    if (el) el.style.display = '';
  });
  // Reset slot displays
  ['a','b'].forEach(slot => {
    document.getElementById(`compare-name-${slot}`).textContent = 'Select a mammal…';
    document.getElementById(`compare-name-${slot}`).className = 'compare-slot-placeholder';
    document.getElementById(`compare-slot-${slot}`).classList.remove('filled');
    document.getElementById(`compare-clear-${slot}`).style.display = 'none';
    document.getElementById(`compare-search-${slot}`).value = '';
    document.getElementById(`compare-dropdown-${slot}`).classList.remove('open');
  });
  renderMammals();
}

function openCompareDropdown(slot) {
  filterCompareDropdown(slot);
  document.getElementById(`compare-dropdown-${slot}`).classList.add('open');
}

function filterCompareDropdown(slot) {
  const search = document.getElementById(`compare-search-${slot}`).value.toLowerCase();
  const otherSlot = slot === 'a' ? 'b' : 'a';
  const otherName = compareSelection[otherSlot] ? compareSelection[otherSlot].name : null;

  const filtered = mammals.filter(m => {
    if (m.name === otherName) return false;
    return !search || m.name.toLowerCase().includes(search);
  });

  const dropdown = document.getElementById(`compare-dropdown-${slot}`);
  dropdown.innerHTML = filtered.map(m =>
    `<div class="compare-dropdown-item" onclick="selectCompareSpecies('${slot}','${m.name.replace(/'/g, "\\'")}')">` + m.name + `</div>`
  ).join('');
  dropdown.classList.add('open');
}

function selectCompareSpecies(slot, name) {
  const mammal = mammals.find(m => m.name === name);
  if (!mammal) return;
  compareSelection[slot] = mammal;
  updateCompareSlotDisplay(slot);
  document.getElementById(`compare-search-${slot}`).value = '';
  document.getElementById(`compare-dropdown-${slot}`).classList.remove('open');

  if (compareSelection.a && compareSelection.b) {
    renderComparison();
    document.getElementById('compare-swap').style.display = 'flex';
  }
}

function updateCompareSlotDisplay(slot) {
  const m = compareSelection[slot];
  const nameEl = document.getElementById(`compare-name-${slot}`);
  const slotEl = document.getElementById(`compare-slot-${slot}`);
  const clearEl = document.getElementById(`compare-clear-${slot}`);
  if (m) {
    nameEl.textContent = m.name;
    nameEl.className = 'compare-slot-name';
    slotEl.classList.add('filled');
    clearEl.style.display = 'flex';
  } else {
    nameEl.textContent = 'Select a mammal…';
    nameEl.className = 'compare-slot-placeholder';
    slotEl.classList.remove('filled');
    clearEl.style.display = 'none';
  }
}

function clearCompareSlot(slot) {
  compareSelection[slot] = null;
  updateCompareSlotDisplay(slot);
  document.getElementById(`compare-search-${slot}`).value = '';
  document.getElementById(`compare-dropdown-${slot}`).classList.remove('open');
  document.getElementById('compare-results').innerHTML = '';
  document.getElementById('compare-images-section').innerHTML = '';
  document.getElementById('compare-swap').style.display = 'none';
}

function swapCompareSlots() {
  const temp = compareSelection.a;
  compareSelection.a = compareSelection.b;
  compareSelection.b = temp;
  updateCompareSlotDisplay('a');
  updateCompareSlotDisplay('b');
  if (compareSelection.a && compareSelection.b) renderComparison();
}

function renderComparison() {
  const a = compareSelection.a;
  const b = compareSelection.b;
  if (!a || !b) return;

  compareImagesLoaded = false;

  const fields = [
    { key:'cat', label:'Category', fmt: v => catLabels[v] || v },
    { key:'weight', label:'Adult Weight' },
    { key:'lifespan', label:'Lifespan' },
    { key:'gestation', label:'Gestation' },
    { key:'weaning', label:'Weaning Age' },
    { key:'territorial', label:'Territorial' },
    { key:'social', label:'Social Structure' },
    { key:'food', label:'Diet / Food' },
  ];

  const resultsHTML = fields.map(f => {
    const va = f.fmt ? f.fmt(a[f.key]) : a[f.key];
    const vb = f.fmt ? f.fmt(b[f.key]) : b[f.key];
    const isDiff = va !== vb;
    return `
      <div class="compare-row${isDiff ? ' diff' : ''}">
        <div class="compare-row-label">${f.label}</div>
        <div class="compare-cell">
          <div class="compare-cell-header">${a.name}</div>
          ${va}
        </div>
        <div class="compare-cell">
          <div class="compare-cell-header">${b.name}</div>
          ${vb}
        </div>
      </div>`;
  }).join('');

  document.getElementById('compare-results').innerHTML = resultsHTML;
  renderCompareImages();
}

function renderCompareImages() {
  const a = compareSelection.a;
  const b = compareSelection.b;
  const isOnline = navigator.onLine;
  const aId = inatIds[a.name];
  const bId = inatIds[b.name];

  const section = document.getElementById('compare-images-section');
  if (!aId && !bId) { section.innerHTML = ''; return; }

  section.innerHTML = `
    <button class="compare-images-toggle" onclick="toggleCompareImages()"
            ${!isOnline ? 'disabled style="opacity:0.4;pointer-events:none"' : ''}>
      ${IMG_ICON}
      <span>${isOnline ? 'View images side by side' : 'Images unavailable offline'}</span>
      <svg id="compare-img-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           style="transition:transform .3s"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="compare-images-panel" id="compare-images-panel">
      <div class="compare-img-col">
        <div class="compare-img-col-header">${a.name}</div>
        <div class="compare-img-col-body" id="compare-img-a">
          <div class="gallery-loading"><div class="spinner"></div></div>
        </div>
      </div>
      <div class="compare-img-col">
        <div class="compare-img-col-header">${b.name}</div>
        <div class="compare-img-col-body" id="compare-img-b">
          <div class="gallery-loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>`;
}

function toggleCompareImages() {
  const panel = document.getElementById('compare-images-panel');
  const chevron = document.getElementById('compare-img-chevron');
  const isOpen = panel.classList.toggle('open');
  chevron.style.transform = isOpen ? 'rotate(180deg)' : '';

  if (isOpen && !compareImagesLoaded) {
    compareImagesLoaded = true;
    loadCompareImage('a');
    loadCompareImage('b');
  }
}

function loadCompareImage(slot) {
  const mammal = compareSelection[slot];
  if (!mammal) return;
  const id = inatIds[mammal.name];
  if (!id) {
    document.getElementById(`compare-img-${slot}`).innerHTML =
      '<div class="gallery-error" style="font-size:.75rem">No photos available</div>';
    return;
  }

  if (galleryCache.has(id)) {
    renderCompareSlotImages(slot, galleryCache.get(id));
    return;
  }

  fetch(`https://api.inaturalist.org/v1/taxa/${id}?locale=en`)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      const t = data.results && data.results[0];
      const photos = ((t && t.taxon_photos) || [])
        .filter(p => p && p.photo && p.photo.url)
        .slice(0, 4)
        .map(p => ({
          thumb: p.photo.url.replace('/square.', '/medium.'),
          full:  p.photo.url.replace('/square.', '/large.'),
        }));
      galleryCache.set(id, photos);
      renderCompareSlotImages(slot, photos);
    })
    .catch(() => {
      document.getElementById(`compare-img-${slot}`).innerHTML =
        '<div class="gallery-error" style="font-size:.75rem">Couldn\'t load images</div>';
    });
}

function renderCompareSlotImages(slot, photos) {
  const el = document.getElementById(`compare-img-${slot}`);
  if (!photos.length) {
    el.innerHTML = '<div class="gallery-error" style="font-size:.75rem">No photos available</div>';
    return;
  }
  el.innerHTML = photos.map(p =>
    `<a href="${p.full}" target="_blank" rel="noopener noreferrer">
       <img src="${p.thumb}" loading="lazy" decoding="async" alt=""
            onerror="this.parentElement.style.display='none'">
     </a>`
  ).join('');
}

// Close compare dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.compare-dropdown-wrap')) {
    document.querySelectorAll('.compare-dropdown').forEach(d => d.classList.remove('open'));
  }
});

// ============================================

// ============================================
initMammalFilters();
initTrackFilters();
renderMammals();
renderTracks();
renderTrees();
updateOnlineStatus();
</script>

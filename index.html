<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="African wildlife and tree study guide for field guide training">
<title>Bush Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg-card: #1a1a1a;
  --bg-card-hover: #222;
  --bg-elevated: #252525;
  --amber: #e8a838;
  --amber-dim: #c4892a;
  --amber-glow: rgba(232,168,56,0.15);
  --burnt: #c45d2c;
  --earth: #8b6b4a;
  --sage: #6b8f71;
  --sage-dim: #4a6b4f;
  --text: #e8e0d8;
  --text-dim: #9a9088;
  --text-faint: #6a6058;
  --border: #2a2a2a;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:80px;
}
/* NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(15,15,15,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:10px 4px 8px; gap:3px;
  background:none; border:none; color:var(--text-dim);
  font:500 10px/1 'Inter',sans-serif; cursor:pointer;
  transition:color .2s;
}
.nav-btn.active { color:var(--amber); }
.nav-btn svg { width:22px; height:22px; }
.nav-btn.active svg { filter:drop-shadow(0 0 6px var(--amber-glow)); }

/* HEADER */
.header {
  padding:20px 20px 16px;
  position:sticky; top:0; z-index:50;
  background:rgba(15,15,15,0.88);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.header h1 {
  font-size:1.5rem; font-weight:700;
  background:linear-gradient(135deg,var(--amber),var(--burnt));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.header .subtitle { font-size:.75rem; color:var(--text-dim); margin-top:2px; }

/* SEARCH */
.search-wrap {
  margin:0 16px 12px; position:relative;
}
.search-input {
  width:100%; padding:12px 16px 12px 40px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font:400 .9rem 'Inter',sans-serif; outline:none;
  transition:border-color .2s;
}
.search-input:focus { border-color:var(--amber-dim); }
.search-input::placeholder { color:var(--text-faint); }
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--text-faint); width:16px; height:16px;
}

/* FILTER PILLS */
.filters {
  display:flex; gap:8px; padding:0 16px 16px;
  overflow-x:auto; scrollbar-width:none;
}
.filters::-webkit-scrollbar { display:none; }
.pill {
  flex-shrink:0; padding:7px 14px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:20px; color:var(--text-dim);
  font:500 .75rem 'Inter',sans-serif; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.pill.active { background:var(--amber); color:#111; border-color:var(--amber); }

/* CARDS GRID */
.cards {
  display:grid; grid-template-columns:1fr;
  gap:12px; padding:0 16px 20px;
}

/* MAMMAL CARD */
.card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:all .25s;
}
.card:active { transform:scale(0.98); }
.card-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 16px 12px;
}
.card-name {
  font-size:1rem; font-weight:600; color:var(--text);
  line-height:1.3;
}
.card-category {
  font-size:.65rem; font-weight:500;
  padding:3px 8px; border-radius:10px;
  text-transform:uppercase; letter-spacing:.5px;
  flex-shrink:0; margin-left:8px;
}
.cat-predator { background:rgba(196,93,44,0.2); color:#e07040; }
.cat-primate { background:rgba(139,107,74,0.2); color:#c4a06a; }
.cat-herbivore { background:rgba(107,143,113,0.2); color:#8bc490; }
.cat-small { background:rgba(120,100,140,0.2); color:#b0a0d0; }
.cat-other { background:rgba(160,140,100,0.2); color:#d0c0a0; }

.card-body {
  max-height:0; overflow:hidden;
  transition:max-height .4s ease;
}
.card.open .card-body { max-height:800px; }
.card-body-inner { padding:0 16px 16px; }

.stat-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px;
}
.stat {
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  padding:10px 12px;
}
.stat-label {
  font-size:.65rem; font-weight:500;
  color:var(--text-faint); text-transform:uppercase;
  letter-spacing:.5px; margin-bottom:4px;
}
.stat-value {
  font-size:.85rem; font-weight:500; color:var(--text);
  line-height:1.4;
}
.stat.full { grid-column:1/-1; }

.card-chevron {
  transition:transform .3s;
  color:var(--text-faint);
  width:18px; height:18px;
}
.card.open .card-chevron { transform:rotate(180deg); }

/* TRACK SECTION */
.track-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  cursor:pointer;
  transition:all .25s;
}
.track-card:active { transform:scale(0.98); }
.track-top {
  display:flex; align-items:center; gap:14px;
}
.track-svg-wrap {
  width:72px; height:72px; flex-shrink:0;
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  padding:8px;
}
.track-svg-wrap svg {
  width:100%; height:100%;
}
.track-info { flex:1; }
.track-name { font-size:1rem; font-weight:600; margin-bottom:4px; }
.track-hint { font-size:.8rem; color:var(--text-dim); line-height:1.4; }
.track-details {
  max-height:0; overflow:hidden; transition:max-height .4s ease;
}
.track-card.open .track-details { max-height:400px; }
.track-details-inner {
  padding-top:14px; margin-top:14px;
  border-top:1px solid var(--border);
  font-size:.85rem; color:var(--text-dim); line-height:1.6;
}
.track-feature { 
  display:flex; gap:8px; margin-bottom:6px; align-items:flex-start; 
}
.track-feature::before {
  content:'•'; color:var(--amber); flex-shrink:0; margin-top:-1px;
}

/* TREE SECTION */
.tree-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  cursor:pointer;
  transition:all .25s;
  display:flex; justify-content:space-between; align-items:center;
}
.tree-card:active { transform:scale(0.98); }
.tree-common { font-size:.95rem; font-weight:600; }
.tree-sci {
  font-size:.85rem; color:var(--sage);
  font-style:italic; text-align:right;
  max-width:55%; opacity:0;
  transition:opacity .3s;
}
.tree-card.show .tree-sci { opacity:1; }
.tree-card .reveal-hint {
  font-size:.7rem; color:var(--text-faint);
  transition:opacity .3s;
}
.tree-card.show .reveal-hint { opacity:0; position:absolute; }

/* QUIZ */
.quiz-container { padding:0 16px 20px; }
.quiz-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 20px;
  text-align:center;
  min-height:200px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.quiz-question {
  font-size:1.1rem; font-weight:600;
  margin-bottom:6px; line-height:1.4;
}
.quiz-sub {
  font-size:.8rem; color:var(--text-dim); margin-bottom:20px;
}
.quiz-options {
  display:flex; flex-direction:column;
  gap:10px; width:100%;
}
.quiz-opt {
  padding:14px 16px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text); font:500 .9rem 'Inter',sans-serif;
  cursor:pointer; text-align:left;
  transition:all .2s;
}
.quiz-opt:active { transform:scale(0.98); }
.quiz-opt.correct { background:rgba(107,143,113,0.3); border-color:var(--sage); color:#a0e0a8; }
.quiz-opt.wrong { background:rgba(196,93,44,0.2); border-color:var(--burnt); color:#e08060; }

.quiz-controls {
  display:flex; gap:10px; margin-top:16px; width:100%;
}
.quiz-btn {
  flex:1; padding:14px;
  border:none; border-radius:var(--radius-sm);
  font:600 .85rem 'Inter',sans-serif;
  cursor:pointer; transition:all .2s;
}
.quiz-btn:active { transform:scale(0.97); }
.quiz-btn-primary { background:var(--amber); color:#111; }
.quiz-btn-secondary { background:var(--bg-elevated); color:var(--text); border:1px solid var(--border); }

.quiz-score {
  display:flex; gap:16px; justify-content:center;
  margin-bottom:16px;
}
.quiz-score-item {
  text-align:center;
}
.quiz-score-num {
  font-size:1.8rem; font-weight:700;
}
.quiz-score-label {
  font-size:.7rem; color:var(--text-dim); text-transform:uppercase;
  letter-spacing:.5px;
}
.score-correct .quiz-score-num { color:var(--sage); }
.score-wrong .quiz-score-num { color:var(--burnt); }
.score-total .quiz-score-num { color:var(--amber); }

.quiz-type-select {
  display:flex; flex-direction:column; gap:10px; width:100%;
}
.quiz-type-btn {
  padding:16px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text); font:500 .9rem 'Inter',sans-serif;
  cursor:pointer; text-align:left;
  transition:all .2s;
}
.quiz-type-btn:active { transform:scale(0.98); }
.quiz-type-btn .qt-title { font-weight:600; margin-bottom:4px; }
.quiz-type-btn .qt-desc { font-size:.75rem; color:var(--text-dim); }

/* SECTION VISIBILITY */
.section { display:none; }
.section.active { display:block; }

/* COUNTER */
.counter {
  padding:0 16px 12px;
  font-size:.75rem; color:var(--text-faint);
}

/* Animations */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.card, .track-card, .tree-card {
  animation:fadeIn .3s ease forwards;
}

/* Scroll to top button */
.scroll-top {
  position:fixed; bottom:88px; right:16px;
  width:40px; height:40px;
  background:var(--amber); color:#111;
  border:none; border-radius:50%;
  display:none; align-items:center; justify-content:center;
  cursor:pointer; z-index:90;
  box-shadow:var(--shadow);
  transition:opacity .2s;
}
.scroll-top.visible { display:flex; }
</style>
</head>
<body>

<!-- MAMMALS SECTION -->
<div id="sec-mammals" class="section active">
  <div class="header">
    <h1>🌍 Bush Study Guide</h1>
    <div class="subtitle">Mammals • Tracks • Trees • Quiz</div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="mammal-search" type="text" placeholder="Search mammals…">
  </div>
  <div class="filters" id="mammal-filters"></div>
  <div class="counter" id="mammal-counter"></div>
  <div class="cards" id="mammal-cards"></div>
</div>

<!-- TRACKS SECTION -->
<div id="sec-tracks" class="section">
  <div class="header">
    <h1>🐾 Track ID</h1>
    <div class="subtitle">Tap to reveal identification features</div>
  </div>
  <div class="filters" id="track-filters"></div>
  <div class="cards" id="track-cards"></div>
</div>

<!-- TREES SECTION -->
<div id="sec-trees" class="section">
  <div class="header">
    <h1>🌳 Trees</h1>
    <div class="subtitle">Tap to reveal scientific name</div>
  </div>
  <div class="cards" id="tree-cards"></div>
  <div style="padding:12px 16px">
    <button class="quiz-btn quiz-btn-secondary" style="width:100%" onclick="toggleAllTrees()">Toggle All</button>
  </div>
</div>

<!-- QUIZ SECTION -->
<div id="sec-quiz" class="section">
  <div class="header">
    <h1>🧠 Quiz</h1>
    <div class="subtitle">Test your knowledge</div>
  </div>
  <div class="quiz-container" id="quiz-area"></div>
</div>

<!-- SCROLL TOP -->
<button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-section="mammals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/><path d="M8 9h.01M16 9h.01M8 14s1.5 2 4 2 4-2 4-2"/></svg>
    <span>Mammals</span>
  </button>
  <button class="nav-btn" data-section="tracks">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="8" r="2"/><circle cx="17" cy="8" r="2"/><circle cx="7" cy="16" r="2"/><circle cx="17" cy="16" r="2"/></svg>
    <span>Tracks</span>
  </button>
  <button class="nav-btn" data-section="trees">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22V8"/><path d="M5 12l7-10 7 10"/><path d="M3 17l9-7 9 7"/></svg>
    <span>Trees</span>
  </button>
  <button class="nav-btn" data-section="quiz">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span>Quiz</span>
  </button>
</nav>

<script>
// ============================================
// DATA
// ============================================
const mammals = [
  {name:"Lion",cat:"predator",lifespan:"10–14 yrs",weight:"♂ 190 kg / ♀ 130 kg",gestation:"110 days (~3.5 months)",weaning:"6–7 months",territorial:"Yes – males defend pride territory",social:"Prides of related females (4–12) with a coalition of 1–4 males. Cubs raised communally.",food:"Large ungulates (wildebeest, zebra, buffalo). Opportunistic; also scavenge."},
  {name:"Leopard",cat:"predator",lifespan:"12–17 yrs",weight:"♂ 60 kg / ♀ 32 kg",gestation:"96 days (~3 months)",weaning:"~3 months",territorial:"Yes – both sexes maintain territories; males overlap several females",social:"Solitary. Males and females meet only to mate. Females raise cubs alone.",food:"Medium prey (impala, duiker, baboons). Very opportunistic; hoists kills into trees."},
  {name:"Cheetah",cat:"predator",lifespan:"10–12 yrs",weight:"♂ 54 kg / ♀ 43 kg",gestation:"90–95 days (~3 months)",weaning:"3–6 months",territorial:"Males – yes (coalitions hold territories). Females – no (wide home ranges).",social:"Males form coalitions (often brothers, 2–3). Females solitary except when with cubs.",food:"Small to medium antelope (impala, springbok). Hunts by high-speed chase in open areas."},
  {name:"Spotted Hyena",cat:"predator",lifespan:"12–25 yrs",weight:"♂ 60 kg / ♀ 70 kg (females larger)",gestation:"110 days (~3.5 months)",weaning:"12–16 months",territorial:"Yes – clans defend territories; boundary latrines and pasting",social:"Clans of up to 80 individuals. Matriarchal – females dominant over males. Complex social hierarchy.",food:"Very varied. Active hunters (wildebeest, zebra) and scavengers. Powerful jaws crush bone."},
  {name:"African Wild Dog",cat:"predator",lifespan:"10–12 yrs",weight:"20–30 kg",gestation:"70 days (~2.5 months)",weaning:"~5 weeks (then regurgitate food)",territorial:"No fixed territory – large home ranges that may overlap",social:"Packs of 6–20. Highly cooperative. Dominant breeding pair; all help raise pups. 'Sneeze voting' for hunts.",food:"Medium antelope (impala, nyala). Cooperative pack hunters with ~80% hunt success rate."},
  {name:"Black-backed Jackal",cat:"predator",lifespan:"7–9 yrs",weight:"6–10 kg",gestation:"60 days",weaning:"8–9 weeks",territorial:"Yes – monogamous pairs defend territory",social:"Monogamous pairs, sometimes with sub-adult helpers from previous litters.",food:"Omnivorous – insects, rodents, small mammals, carrion, fruit, birds' eggs."},
  {name:"Side-striped Jackal",cat:"predator",lifespan:"10–12 yrs",weight:"7–12 kg",gestation:"57–70 days",weaning:"8–10 weeks",territorial:"Yes – pairs defend territories",social:"Monogamous pairs. More nocturnal and secretive than black-backed jackal.",food:"Omnivorous; more frugivorous than black-backed jackal. Fruit, insects, small vertebrates."},
  {name:"Honey Badger",cat:"small",lifespan:"~24 yrs",weight:"♂ 12 kg / ♀ 9 kg",gestation:"~6 months (delayed implantation possible)",weaning:"~3 months",territorial:"Males – yes (large ranges overlapping females). Females – smaller ranges.",social:"Solitary. Highly aggressive and fearless. Pairs meet only for mating.",food:"Omnivorous – honey & bee larvae, scorpions, snakes (immune to some venoms), rodents, fruit."},
  {name:"African Wildcat",cat:"small",lifespan:"12–15 yrs",weight:"3–6.5 kg",gestation:"56–69 days",weaning:"~3 months",territorial:"Yes – both sexes; males have larger territories",social:"Solitary. Primarily nocturnal. Ancestor of the domestic cat.",food:"Small rodents (main prey), birds, insects, reptiles, hares."},
  {name:"White-tailed Mongoose",cat:"small",lifespan:"~12 yrs",weight:"3–5 kg",gestation:"~60 days",weaning:"6–9 weeks",territorial:"Yes – scent-marks with anal glands",social:"Solitary or in pairs. Largest African mongoose. Strictly nocturnal.",food:"Insects (especially beetles), small vertebrates, frogs, eggs."},
  {name:"Banded Mongoose",cat:"small",lifespan:"10–12 yrs",weight:"1–2 kg",gestation:"~60 days",weaning:"~4 weeks",territorial:"Yes – group territory defended collectively",social:"Groups of 5–40. Highly social and cooperative. Communal denning, babysitting, and foraging.",food:"Insects (beetles, millipedes), spiders, small vertebrates, eggs, fruit."},
  {name:"Large-spotted Genet",cat:"small",lifespan:"8–13 yrs",weight:"1.5–3 kg",gestation:"~70 days",weaning:"~2 months",territorial:"Loosely – overlapping home ranges with scent-marking via latrines",social:"Solitary. Nocturnal and arboreal. Agile climber.",food:"Omnivorous – rodents, birds, insects, fruit, reptiles. Opportunistic."},
  {name:"African Civet",cat:"small",lifespan:"12–15 yrs",weight:"9–15 kg",gestation:"60–72 days",weaning:"~1 month (solid food at 1 month)",territorial:"Uses communal middens (civetries) for scent communication",social:"Solitary. Nocturnal. Terrestrial despite arboreal appearance.",food:"Omnivorous – fruit (major component), insects, millipedes, small vertebrates, carrion."},
  {name:"Thick-tailed Bushbaby",cat:"primate",lifespan:"~14 yrs",weight:"1–1.5 kg",gestation:"~130 days",weaning:"~3.5 months",territorial:"Yes – scent-mark with urine-washing of hands and feet",social:"Semi-social. Sleeps in tree hollows in small groups, but forages alone. Loud screaming call.",food:"Fruit, tree gum, insects. Gum-feeding specialist."},
  {name:"Lesser Bushbaby",cat:"primate",lifespan:"10–14 yrs",weight:"150–250 g",gestation:"120–133 days",weaning:"~6 weeks",territorial:"Yes – urine-washing for scent trails",social:"Semi-social. Sleeping groups during the day, solitary foraging at night.",food:"Tree gum (primary food), insects. Specialized gum-feeding teeth."},
  {name:"Chacma Baboon",cat:"primate",lifespan:"20–30 yrs",weight:"♂ 30 kg / ♀ 15 kg",gestation:"187 days (~6 months)",weaning:"~12 months",territorial:"No – troops use large overlapping home ranges",social:"Troops of 20–100. Complex hierarchy. Males compete for dominance; females inherit rank from mothers.",food:"Omnivorous – fruit, seeds, roots, insects, small vertebrates, eggs. Highly adaptable."},
  {name:"Vervet Monkey",cat:"primate",lifespan:"12–24 yrs",weight:"♂ 5.5 kg / ♀ 4 kg",gestation:"165 days (~5.5 months)",weaning:"~6 months",territorial:"Yes – troops defend core areas",social:"Troops of 10–50. Matrilineal hierarchy. Famous for specific alarm calls for different predators (eagle, leopard, snake).",food:"Omnivorous – fruit, leaves, flowers, insects, eggs. Crop-raiding where habituated."},
  {name:"Black Rhino",cat:"herbivore",lifespan:"35–50 yrs",weight:"800–1,400 kg",gestation:"~15 months",weaning:"~2 yrs",territorial:"Yes – bulls maintain territories with dung middens and urine spraying",social:"Solitary. More aggressive than white rhino. Prehensile (hooked) upper lip for browsing.",food:"Hindgut fermenter (caecal). Browser – shrubs, bushes, low-growing trees, herbs. Hooked lip adapted for grasping twigs."},

const catLabels = {predator:"Predator",primate:"Primate",herbivore:"Herbivore",small:"Small Carnivore / Nocturnal",other:"Other"};
const catCss = {predator:"cat-predator",primate:"cat-primate",herbivore:"cat-herbivore",small:"cat-small",other:"cat-other"};
const trackGroups = {megaherbivore:"Megaherbivore",herbivore:"Herbivore",predator:"Predator",small:"Small Carnivore"};

// ============================================
// RENDER MAMMALS
// ============================================
let activeMammalFilter = 'all';
function renderMammals() {
  const search = document.getElementById('mammal-search').value.toLowerCase();
  const container = document.getElementById('mammal-cards');
  const filtered = mammals.filter(m => {
    const matchCat = activeMammalFilter === 'all' || m.cat === activeMammalFilter;
    const matchSearch = !search || m.name.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  container.innerHTML = filtered.map((m, i) => `
    <div class="card" data-idx="${i}" onclick="this.classList.toggle('open')">
      <div class="card-header">
        <div class="card-name">${m.name}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="card-category ${catCss[m.cat]}">${catLabels[m.cat]}</span>
          <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-body"><div class="card-body-inner">
        <div class="stat-grid">
          <div class="stat"><div class="stat-label">Lifespan</div><div class="stat-value">${m.lifespan}</div></div>
          <div class="stat"><div class="stat-label">Adult Weight</div><div class="stat-value">${m.weight}</div></div>
          <div class="stat"><div class="stat-label">Gestation</div><div class="stat-value">${m.gestation}</div></div>
          <div class="stat"><div class="stat-label">Weaning Age</div><div class="stat-value">${m.weaning}</div></div>
          <div class="stat full"><div class="stat-label">Territorial</div><div class="stat-value">${m.territorial}</div></div>
          <div class="stat full"><div class="stat-label">Social Structure</div><div class="stat-value">${m.social}</div></div>
          <div class="stat full"><div class="stat-label">Food</div><div class="stat-value">${m.food}</div></div>
        </div>
      </div></div>
    </div>
  `).join('');
  document.getElementById('mammal-counter').textContent = `${filtered.length} of ${mammals.length} mammals`;
}

function initMammalFilters() {
  const el = document.getElementById('mammal-filters');
  const cats = [{key:'all',label:'All'},...Object.entries(catLabels).map(([k,v])=>({key:k,label:v}))];
  el.innerHTML = cats.map(c => `<button class="pill${c.key==='all'?' active':''}" data-cat="${c.key}">${c.label}</button>`).join('');
  el.addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if(!btn) return;
    el.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    activeMammalFilter = btn.dataset.cat;
    renderMammals();
  });
}

// ============================================
// RENDER TRACKS
// ============================================
let activeTrackFilter = 'all';
function renderTracks() {
  const container = document.getElementById('track-cards');
  const filtered = tracks.filter(t => activeTrackFilter === 'all' || t.group === activeTrackFilter);
  container.innerHTML = filtered.map(t => `
    <div class="track-card" onclick="this.classList.toggle('open')">
      <div class="track-top">
        <div class="track-svg-wrap">${t.svg}</div>
        <div class="track-info">
          <div class="track-name">${t.name}</div>
          <div class="track-hint">${t.size} • ${t.toes}</div>
        </div>
      </div>
      <div class="track-details"><div class="track-details-inner">
        ${t.features.map(f=>`<div class="track-feature">${f}</div>`).join('')}
      </div></div>
    </div>
  `).join('');
}

function initTrackFilters() {
  const el = document.getElementById('track-filters');
  const groups = [{key:'all',label:'All'},...Object.entries(trackGroups).map(([k,v])=>({key:k,label:v}))];
  el.innerHTML = groups.map(g => `<button class="pill${g.key==='all'?' active':''}" data-grp="${g.key}">${g.label}</button>`).join('');
  el.addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if(!btn) return;
    el.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    activeTrackFilter = btn.dataset.grp;
    renderTracks();
  });
}

// ============================================
// RENDER TREES
// ============================================
let allTreesShown = false;
function renderTrees() {
  const container = document.getElementById('tree-cards');
  container.innerHTML = trees.map((t,i) => `
    <div class="tree-card" data-idx="${i}" onclick="this.classList.toggle('show')">
      <div>
        <div class="tree-common">${t.common}</div>
        <div class="reveal-hint" style="margin-top:4px">Tap to reveal</div>
      </div>
      <div class="tree-sci">${t.sci}</div>
    </div>
  `).join('');
}
function toggleAllTrees() {
  allTreesShown = !allTreesShown;
  document.querySelectorAll('.tree-card').forEach(c => {
    if(allTreesShown) c.classList.add('show');
    else c.classList.remove('show');
  });
}

// ============================================
// QUIZ ENGINE
// ============================================
let quiz = { type:null, questions:[], idx:0, score:0, wrong:0, answered:false };

function showQuizMenu() {
  document.getElementById('quiz-area').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-question">Choose a Quiz</div>
      <div class="quiz-sub">Test your knowledge across different categories</div>
      <div class="quiz-type-select">
        <button class="quiz-type-btn" onclick="startQuiz('mammal-facts')">
          <div class="qt-title">🦁 Mammal Facts</div>
          <div class="qt-desc">Lifespan, weight, gestation, weaning, diet, social structure</div>
        </button>
        <button class="quiz-type-btn" onclick="startQuiz('territorial')">
          <div class="qt-title">📍 Territorial or Not?</div>
          <div class="qt-desc">Is this mammal territorial?</div>
        </button>
        <button class="quiz-type-btn" onclick="startQuiz('track-id')">
          <div class="qt-title">🐾 Track Identification</div>
          <div class="qt-desc">Match the track description to the animal</div>
        </button>
        <button class="quiz-type-btn" onclick="startQuiz('tree-sci')">
          <div class="qt-title">🌳 Tree Scientific Names</div>
          <div class="qt-desc">Match common names to scientific names</div>
        </button>
        <button class="quiz-type-btn" onclick="startQuiz('tree-common')">
          <div class="qt-title">🌿 Tree Common Names</div>
          <div class="qt-desc">Match scientific names to common names</div>
        </button>
      </div>
    </div>
  `;
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function pickRandom(arr, n, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return shuffle(pool).slice(0, n);
}

function generateMammalFactQuestions() {
  const qs = [];
  const fields = [
    {key:'lifespan',label:'lifespan'},
    {key:'weight',label:'adult weight'},
    {key:'gestation',label:'gestation period'},
    {key:'weaning',label:'weaning age'},
    {key:'food',label:'diet'},
  ];
  const pool = shuffle(mammals);
  for(const m of pool) {
    const f = fields[Math.floor(Math.random()*fields.length)];
    const correct = m[f.key];
    const wrongs = pickRandom(mammals, 3, m).map(w => w[f.key]);
    const opts = shuffle([correct, ...wrongs]);
    qs.push({
      q: `What is the ${f.label} of the <strong>${m.name}</strong>?`,
      opts, correct
    });
  }
  return qs.slice(0, 20);
}

function generateTerritorialQuestions() {
  const qs = [];
  const pool = shuffle(mammals);
  for(const m of pool) {
    const isYes = m.territorial.toLowerCase().startsWith('yes');
    qs.push({
      q: `Is the <strong>${m.name}</strong> territorial?`,
      opts: ['Yes','No'],
      correct: isYes ? 'Yes' : 'No',
      detail: m.territorial
    });
  }
  return qs.slice(0, 20);
}

function generateTrackQuestions() {
  const qs = [];
  const pool = shuffle(tracks);
  for(const t of pool) {
    const hint = t.features[Math.floor(Math.random()*t.features.length)];
    const wrongs = pickRandom(tracks, 3, t).map(w => w.name);
    const opts = shuffle([t.name, ...wrongs]);
    qs.push({
      q: `Which animal has this track feature?<br><em>"${hint}"</em>`,
      sub: `Size: ${t.size}`,
      opts, correct: t.name
    });
  }
  return qs;
}

function generateTreeSciQuestions() {
  const qs = [];
  const pool = shuffle(trees);
  for(const t of pool) {
    const wrongs = pickRandom(trees, 3, t).map(w => w.sci);
    const opts = shuffle([t.sci, ...wrongs]);
    qs.push({
      q: `What is the scientific name of <strong>${t.common}</strong>?`,
      opts, correct: t.sci
    });
  }
  return qs;
}

function generateTreeCommonQuestions() {
  const qs = [];
  const pool = shuffle(trees);
  for(const t of pool) {
    const wrongs = pickRandom(trees, 3, t).map(w => w.common);
    const opts = shuffle([t.common, ...wrongs]);
    qs.push({
      q: `What is the common name of <em>${t.sci}</em>?`,
      opts, correct: t.common
    });
  }
  return qs;
}

function startQuiz(type) {
  quiz.type = type;
  quiz.idx = 0;
  quiz.score = 0;
  quiz.wrong = 0;
  quiz.answered = false;
  switch(type) {
    case 'mammal-facts': quiz.questions = generateMammalFactQuestions(); break;
    case 'territorial': quiz.questions = generateTerritorialQuestions(); break;
    case 'track-id': quiz.questions = generateTrackQuestions(); break;
    case 'tree-sci': quiz.questions = generateTreeSciQuestions(); break;
    case 'tree-common': quiz.questions = generateTreeCommonQuestions(); break;
  }
  renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  if(quiz.idx >= quiz.questions.length) {
    area.innerHTML = `
      <div class="quiz-card">
        <div class="quiz-question">Quiz Complete! 🎉</div>
        <div class="quiz-score">
          <div class="quiz-score-item score-correct"><div class="quiz-score-num">${quiz.score}</div><div class="quiz-score-label">Correct</div></div>
          <div class="quiz-score-item score-wrong"><div class="quiz-score-num">${quiz.wrong}</div><div class="quiz-score-label">Wrong</div></div>
          <div class="quiz-score-item score-total"><div class="quiz-score-num">${Math.round(quiz.score/(quiz.score+quiz.wrong)*100)}%</div><div class="quiz-score-label">Score</div></div>
        </div>
        <div class="quiz-controls">
          <button class="quiz-btn quiz-btn-secondary" onclick="showQuizMenu()">Menu</button>
          <button class="quiz-btn quiz-btn-primary" onclick="startQuiz('${quiz.type}')">Retry</button>
        </div>
      </div>
    `;
    return;
  }
  const q = quiz.questions[quiz.idx];
  quiz.answered = false;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:.8rem;color:var(--text-dim)">${quiz.idx+1} / ${quiz.questions.length}</span>
      <span style="font-size:.8rem;color:var(--sage)">✓ ${quiz.score}</span>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">${q.q}</div>
      ${q.sub ? `<div class="quiz-sub">${q.sub}</div>` : '<div style="height:12px"></div>'}
      <div class="quiz-options">
        ${q.opts.map((o,i) => `<button class="quiz-opt" data-opt="${i}" onclick="answerQuiz(${i})">${o}</button>`).join('')}
      </div>
      ${q.detail ? `<div id="quiz-detail" style="display:none;margin-top:12px;font-size:.8rem;color:var(--text-dim);text-align:left;width:100%;padding:10px;background:var(--bg-elevated);border-radius:var(--radius-sm)">${q.detail}</div>` : ''}
    </div>
    <div class="quiz-controls" style="margin-top:12px">
      <button class="quiz-btn quiz-btn-secondary" onclick="showQuizMenu()">Quit</button>
      <button class="quiz-btn quiz-btn-primary" id="quiz-next" style="opacity:0.4;pointer-events:none" onclick="nextQuiz()">Next →</button>
    </div>
  `;
}

function answerQuiz(optIdx) {
  if(quiz.answered) return;
  quiz.answered = true;
  const q = quiz.questions[quiz.idx];
  const btns = document.querySelectorAll('.quiz-opt');
  const selected = btns[optIdx];
  const isCorrect = q.opts[optIdx] === q.correct;
  if(isCorrect) { quiz.score++; selected.classList.add('correct'); }
  else { quiz.wrong++; selected.classList.add('wrong'); }
  // highlight correct
  btns.forEach((b,i) => { if(q.opts[i] === q.correct) b.classList.add('correct'); });
  // show detail if available
  const detail = document.getElementById('quiz-detail');
  if(detail) detail.style.display = 'block';
  // enable next
  const next = document.getElementById('quiz-next');
  next.style.opacity = '1';
  next.style.pointerEvents = 'auto';
}

function nextQuiz() {
  quiz.idx++;
  renderQuiz();
}

// ============================================
// NAVIGATION
// ============================================
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const sec = btn.dataset.section;
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(`sec-${sec}`).classList.add('active');
    window.scrollTo({top:0});
    if(sec === 'quiz') showQuizMenu();
  });
});

// SCROLL TO TOP
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top');
  if(window.scrollY > 300) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

// SEARCH
document.getElementById('mammal-search').addEventListener('input', renderMammals);

// ============================================
// INIT
// ============================================
initMammalFilters();
initTrackFilters();
renderMammals();
renderTracks();
renderTrees();
</script>
</body>
</html>
